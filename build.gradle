plugins {
    id 'java'
    id 'application'
}

group = 'com.github.modvalidator'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

// Mindustry v159.5 (latest stable as of 2026-07)
def mindustryVersion = 'v159.5'
// Arc commit hash used by this Mindustry build
def arcVersion = '7b92242511'
// Rhino version used by this Mindustry build
def rhinoVersion = 'e74ac129d2bff72c1deb536d7d99a0dbb7046d2e'
// Mindustry source assets directory (jitpack jars do NOT include resources)
def mindustryAssetsDir = '/home/zenxsin/cow/源码和示例/Mindustry/core/assets'

dependencies {
    // Mindustry core (contains all game content logic)
    implementation "com.github.Anuken.Mindustry:core:${mindustryVersion}"
    // Mindustry server (contains ServerLauncher and headless support)
    implementation "com.github.Anuken.Mindustry:server:${mindustryVersion}"

    // Arc framework modules
    implementation "com.github.Anuken.Arc:arc-core:${arcVersion}"
    implementation "com.github.Anuken.Arc:flabel:${arcVersion}"
    implementation "com.github.Anuken.Arc:freetype:${arcVersion}"
    implementation "com.github.Anuken.Arc:g3d:${arcVersion}"
    implementation "com.github.Anuken.Arc:fx:${arcVersion}"
    implementation "com.github.Anuken.Arc:arcnet:${arcVersion}"
    implementation "com.github.Anuken.Arc:backend-headless:${arcVersion}"

    // Rhino (JS engine for Mindustry JS mods)
    implementation "com.github.Anuken:rhino:${rhinoVersion}"

    // LZ4 compression
    implementation "at.yawk.lz4:lz4-java:1.10.2"

    // JLine for console input
    implementation 'org.jline:jline:4.0.0'

    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.1'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

application {
    mainClass = 'modvalidator.ModValidatorCli'
}

test {
    useJUnitPlatform()
    testLogging {
        events "passed", "skipped", "failed"
        exceptionFormat = 'full'
    }
    // Headless tests need a display-free environment
    jvmArgs = [
        '-Djava.awt.headless=true',
        '--add-opens=java.base/sun.reflect.annotation=ALL-UNNAMED'
    ]
}

tasks.withType(JavaCompile){
    options.encoding = 'UTF-8'
    options.compilerArgs += ['--release', '17']
    options.forkOptions.jvmArgs += [
        '--add-opens=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED',
        '--add-opens=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED'
    ]
}

// CLI task: gradle validateMod -PmodPath=/path/to/mod
task validateMod(type: JavaExec){
    group = 'mod-validator'
    description = 'Validate a Mindustry mod dynamically. Usage: gradle validateMod -PmodPath=/path/to/mod'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'modvalidator.ModValidatorCli'
    if(project.hasProperty('modPath')){
        args project.property('modPath')
    }
    jvmArgs = ['-Djava.awt.headless=true']
}

// Fat jar for distribution
task fatJar(type: Jar){
    group = 'build'
    description = 'Build a fat jar with all dependencies'
    archiveClassifier = 'all'
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    // jitpack Mindustry jars do NOT include resource files (locales, version.properties, bundles, etc.)
    // We must manually bundle the Mindustry core assets so that Core.files.internal() can find them via classpath
    from(fileTree(dir: mindustryAssetsDir)) {
        into '/'
    }
    exclude('META-INF/**')
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    manifest {
        attributes 'Main-Class': 'modvalidator.ModValidatorCli'
    }
    with jar
}
